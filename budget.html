<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>תקציב</title>
<style>
:root {
  --primary:#1a3a5c;--primary-d:#12294a;--teal:#01696f;--purple:#7c3aed;
  --font:'Heebo','Segoe UI','Arial Hebrew',Arial,sans-serif;
  --radius:10px;--shadow:0 2px 10px rgba(0,0,0,0.08);
  --border:#e4e9f0;--bg:#f0f2f5;--card:#fff;
  --text:#1e293b;--muted:#64748b;
  --green:#16a34a;--red:#dc2626;--amber:#d97706;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;}
body{display:flex;flex-direction:column;overflow:hidden;}

/* ── HEADER ── */
#bHeader{
  background:var(--primary);padding:10px 16px;
  display:flex;align-items:center;gap:10px;flex-shrink:0;
}
#bHeader h1{color:#fff;font-size:0.95rem;font-weight:800;}
.bh-school{color:rgba(255,255,255,0.6);font-size:0.75rem;}
.bh-spacer{flex:1;}
.bh-save{
  background:var(--teal);color:#fff;border:none;border-radius:7px;
  padding:7px 14px;font-family:var(--font);font-size:0.82rem;font-weight:700;
  cursor:pointer;
}
.bh-save:hover{background:#015e63;}

/* ── TABS ── */
#tabBar{
  display:flex;background:var(--primary-d);padding:0 16px;
  border-bottom:2px solid rgba(255,255,255,0.08);flex-shrink:0;
}
.tab-btn{
  padding:10px 18px;color:rgba(255,255,255,0.5);
  font-size:0.82rem;font-weight:700;border:none;background:none;
  font-family:var(--font);cursor:pointer;border-bottom:2px solid transparent;
  margin-bottom:-2px;transition:all .15s;
}
.tab-btn.active{color:#fff;border-bottom-color:#7ec8e3;}
.tab-btn:hover:not(.active){color:rgba(255,255,255,0.8);}

/* ── SCROLL AREA ── */
#scrollArea{flex:1;overflow-y:auto;padding:14px;}
.tab-panel{display:none;}
.tab-panel.active{display:block;}

/* ── SOURCE CARDS (Tab 1) ── */
.sources-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-bottom:16px;}
.src-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;border-top:4px solid var(--teal);}
.src-card.parents{border-color:#3b82f6;}
.src-card.gapan  {border-color:var(--teal);}
.src-card.authority{border-color:var(--purple);}
.src-title{font-size:0.8rem;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:12px;}
.src-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);}
.src-row:last-child{border-bottom:none;}
.src-label{font-size:0.8rem;color:var(--muted);}
.src-val{font-size:0.88rem;font-weight:700;color:var(--text);}
.src-val.pos{color:var(--green);}
.src-val.neg{color:var(--red);}
.src-balance{margin-top:10px;padding:8px;border-radius:7px;text-align:center;font-weight:800;font-size:0.9rem;}
.src-balance.pos{background:#dcfce7;color:#166534;}
.src-balance.neg{background:#fee2e2;color:#991b1b;}

.total-card{background:var(--primary);color:#fff;border-radius:var(--radius);padding:14px 18px;
  display:flex;gap:20px;flex-wrap:wrap;align-items:center;}
.total-item{text-align:center;}
.total-label{font-size:0.65rem;opacity:.6;text-transform:uppercase;letter-spacing:.6px;}
.total-val{font-size:1rem;font-weight:800;}
.total-val.pos{color:#86efac;}
.total-val.neg{color:#fca5a5;}

/* ── FILTER BAR (Tab 2) ── */
.filter-bar{
  display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;
  background:var(--card);border-radius:var(--radius);padding:10px;
  box-shadow:var(--shadow);
}
.filter-bar select,.filter-bar input{
  padding:6px 10px;border:1px solid var(--border);border-radius:6px;
  font-family:var(--font);font-size:0.8rem;color:var(--text);background:#fff;
  outline:none;
}
.filter-bar input[type=date]{width:130px;}
.fb-spacer{flex:1;}
.btn-add-entry{
  background:var(--teal);color:#fff;border:none;border-radius:6px;
  padding:6px 14px;font-family:var(--font);font-size:0.8rem;font-weight:700;cursor:pointer;
}
.btn-add-entry:hover{background:#015e63;}

/* ── ENTRIES TABLE ── */
.entries-table{width:100%;border-collapse:collapse;font-size:0.82rem;background:var(--card);
  border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;}
.entries-table th{
  text-align:right;padding:8px 10px;font-size:0.7rem;font-weight:700;
  text-transform:uppercase;letter-spacing:.5px;color:var(--muted);
  background:#f8fafc;border-bottom:2px solid var(--border);
}
.entries-table td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:middle;}
.entries-table tr:last-child td{border-bottom:none;}
.entries-table tr:hover td{background:#f8fafc;}
.type-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:0.72rem;font-weight:700;}
.type-income {background:#dcfce7;color:#166534;}
.type-expense{background:#fee2e2;color:#991b1b;}
.src-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:0.72rem;font-weight:600;
  background:#e0f2fe;color:#0369a1;}
.amount-pos{color:var(--green);font-weight:700;}
.amount-neg{color:var(--red);font-weight:700;}
.btn-icon{background:none;border:none;cursor:pointer;font-size:0.9rem;padding:2px 5px;border-radius:4px;}
.btn-icon:hover{background:var(--border);}

/* ── INLINE ADD FORM ── */
.add-form-row td{background:#f0fdf4;padding:6px 10px;}
.add-form-row input,.add-form-row select{
  padding:5px 8px;border:1px solid var(--border);border-radius:5px;
  font-family:var(--font);font-size:0.8rem;width:100%;
}
.btn-confirm{background:var(--green);color:#fff;border:none;border-radius:5px;
  padding:5px 10px;font-family:var(--font);font-size:0.8rem;cursor:pointer;}
.btn-cancel{background:none;border:1px solid var(--border);border-radius:5px;
  padding:5px 10px;font-family:var(--font);font-size:0.8rem;cursor:pointer;color:var(--muted);}

/* ── ALLOCATIONS (Tab 3) ── */
.alloc-section{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
  margin-bottom:14px;overflow:hidden;}
.alloc-header{background:var(--primary);color:#fff;padding:10px 14px;
  display:flex;align-items:center;gap:8px;}
.alloc-header .ah-title{font-size:0.88rem;font-weight:800;flex:1;}
.alloc-body{padding:12px;}
.alloc-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);}
.alloc-row:last-child{border-bottom:none;}
.alloc-name{flex:2;font-size:0.85rem;font-weight:600;}
.alloc-nums{display:flex;gap:14px;flex:3;}
.alloc-num{text-align:center;}
.alloc-num .an-label{font-size:0.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;}
.alloc-num .an-val{font-size:0.85rem;font-weight:700;}
.alloc-bar-wrap{flex:2;background:var(--border);border-radius:10px;height:8px;overflow:hidden;}
.alloc-bar-fill{height:100%;border-radius:10px;background:var(--teal);transition:width .4s;}
.alloc-bar-fill.over{background:var(--red);}
.btn-del-alloc{background:none;border:none;cursor:pointer;color:var(--red);font-size:0.85rem;}
.btn-add-alloc{
  background:none;border:1px dashed var(--teal);color:var(--teal);
  border-radius:6px;padding:5px 14px;font-family:var(--font);font-size:0.8rem;
  cursor:pointer;margin-top:8px;
}

/* ── READONLY ── */
body.readonly-mode input,body.readonly-mode button:not(.readonly-exempt),
body.readonly-mode select,body.readonly-mode textarea{pointer-events:none;opacity:.6;}
.readonly-banner{display:none;background:#7c3aed;color:#fff;text-align:center;
  padding:6px;font-size:0.8rem;font-weight:700;flex-shrink:0;}
body.readonly-mode .readonly-banner{display:block;}
</style>
</head>
<body>

<div class="readonly-banner">👁 מצב צפייה בלבד</div>

<div id="bHeader">
  <h1>💰 תקציב</h1>
  <span class="bh-school" id="bhSchool"></span>
  <div class="bh-spacer"></div>
  <button class="bh-save" onclick="saveToPortal()">💾 שמור</button>
</div>

<div id="tabBar">
  <button class="tab-btn active" onclick="switchTab('overview',this)">סקירה כללית</button>
  <button class="tab-btn" onclick="switchTab('entries',this)">תנועות</button>
  <button class="tab-btn" onclick="switchTab('allocations',this)">ייעודי תקציב</button>
</div>

<div id="scrollArea">

  <!-- TAB 1: OVERVIEW -->
  <div class="tab-panel active" id="tab-overview">
    <div class="sources-grid" id="sourcesGrid"></div>
    <div class="total-card" id="totalCard"></div>
  </div>

  <!-- TAB 2: ENTRIES -->
  <div class="tab-panel" id="tab-entries">
    <div class="filter-bar">
      <select id="fSource" onchange="renderEntries()">
        <option value="">כל המקורות</option>
        <option value="parents">תשלומי הורים</option>
        <option value="gapan">גפ"ן</option>
        <option value="authority">רשות</option>
      </select>
      <select id="fType" onchange="renderEntries()">
        <option value="">הכנסות + הוצאות</option>
        <option value="income">הכנסות בלבד</option>
        <option value="expense">הוצאות בלבד</option>
      </select>
      <input type="text" id="fCat" placeholder="סינון לפי ייעוד..." oninput="renderEntries()" style="width:130px;">
      <input type="date" id="fDateFrom" onchange="renderEntries()">
      <span style="font-size:0.8rem;color:var(--muted);align-self:center;">עד</span>
      <input type="date" id="fDateTo" onchange="renderEntries()">
      <div class="fb-spacer"></div>
      <button class="btn-add-entry" onclick="showAddEntryForm()">＋ הוסף תנועה</button>
    </div>
    <table class="entries-table">
      <thead>
        <tr>
          <th>תאריך</th><th>מקור</th><th>סוג</th><th>ייעוד</th>
          <th>תיאור</th><th>סכום</th><th></th>
        </tr>
      </thead>
      <tbody id="entriesTbody"></tbody>
    </table>
  </div>

  <!-- TAB 3: ALLOCATIONS -->
  <div class="tab-panel" id="tab-allocations">
    <div id="allocContainer"></div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.6/purify.min.js" integrity="sha384-+VfUPEb0PdtChMwmBcBmykRMDd+v6D/oFmB3rZM/puCMDYcIvF968OimRh4KQY9a" crossorigin="anonymous"></script>
<script src="auth-shared.js"></script>
<script>
// SECURITY (Phase 8): this pointed at a different, stale Worker
// ('hacala-api...') than the rest of the portal ('principal-api...').
// Fixed to the same hardened backend everything else uses.
// SECURITY: hostname-based Worker selection — see index.html for rationale.
const WORKER = (location.hostname === 'principal-portal.pages.dev')
  ? 'https://principal-api.1002220729.workers.dev'
  : 'https://principal-api-staging.1002220729.workers.dev';

// ── SECURITY: exact, hard-coded parent-portal origin ─────
// postMessage must never be sent with '*' as target origin, and
// incoming messages must never be trusted without verifying event.origin.
const PORTAL_ORIGIN = window.location.origin; // dynamic: same value in prod and staging since parent+iframes are same-origin by construction

// esc(): sanitizes a value for safe insertion into HTML.
// Uses DOMPurify (loaded via CDN below) and strips ALL tags/attributes,
// returning plain text only — this is the correct behaviour for the
// "escape a value that goes into a text position" use-case that esc()
// is used for throughout this file. Falls back to manual entity-encoding
// only if DOMPurify failed to load, so the page never renders raw HTML.
const esc = s => {
  const str = String(s ?? '');
  const out = window.DOMPurify
    ? DOMPurify.sanitize(str, { ALLOWED_TAGS: [], ALLOWED_ATTR: [] })
    : str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  // Also encode single quotes: esc() output is sometimes interpolated inside
  // single-quoted attribute values (e.g. onclick="fn('${esc(x)}')"), and
  // neither DOMPurify nor the fallback above touches ' by default.
  return out.replace(/'/g, '&#39;');
};
const fmt = n => Number(n||0).toLocaleString('he-IL',{minimumFractionDigits:0,maximumFractionDigits:2});
const srcLabel = {parents:'תשלומי הורים',gapan:'גפ"ן',authority:'רשות'};

let STATE = {
  school:'', year:'',
  entries: [],      // [{id,source,type,category,description,amount,date,created_by}]
  allocations: [],  // [{id,source,category,allocated}]
  summary: { bySource:{}, total:{} },
  addingEntry: false,
};

// ─── postMessage ──────────────────────────────────
window.addEventListener('message', e => {
  // SECURITY: reject anything not from the exact trusted parent origin.
  // No console/error output here on purpose — silently drop untrusted messages.
  if (e.origin !== PORTAL_ORIGIN) return;
  if (!e.data || typeof e.data !== 'object') return;
  if (e.data.type === 'load-data') {
    const { school, year } = e.data.payload || {};
    STATE.school = school || STATE.school;
    STATE.year   = year   || STATE.year;
    document.getElementById('bhSchool').textContent =
      STATE.school ? `${STATE.school} · ${STATE.year}` : '';
    loadFromWorker();
  }
  if (e.data.type === 'set-readonly') {
    // NOTE (Zero Trust): this only toggles a CSS class that hides/disables
    // edit controls for UX purposes. It is NOT a security boundary — the
    // backend Worker MUST independently verify the caller's session/role
    // before honouring any save/update/delete request, regardless of what
    // this flag is set to on the client.
    document.body.classList.toggle('readonly-mode', !!e.data.readonly);
  }
  if (e.data.type === 'request-data') saveToPortal();
});
window.parent.postMessage({ type:'iframe-ready', docType:'budget' }, PORTAL_ORIGIN);

// ─── LOAD ──────────────────────────────────────────
async function loadFromWorker() {
  if (!STATE.school || !STATE.year) return;
  try {
    const res  = await PortalAuth.authFetch(`${WORKER}/api/budget?school=${encodeURIComponent(STATE.school)}&year=${encodeURIComponent(STATE.year)}`);
    const data = await res.json();
    STATE.entries     = data.entries     || [];
    STATE.allocations = data.allocations || [];
    STATE.summary     = data.summary     || { bySource:{}, total:{} };
    renderAll();
  } catch(e) { renderAll(); }
}

function renderAll() {
  renderOverview();
  renderEntries();
  renderAllocations();
}

// ─── TAB SWITCH ────────────────────────────────────
function switchTab(id, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  btn.classList.add('active');
}

// ─── OVERVIEW ──────────────────────────────────────
function renderOverview() {
  const sources = ['parents','gapan','authority'];
  const grid = document.getElementById('sourcesGrid');
  grid.innerHTML = '';
  const clsMap = {parents:'parents',gapan:'gapan',authority:'authority'};

  sources.forEach(s => {
    const d = STATE.summary.bySource?.[s] || { totalIncome:0, totalExpense:0, balance:0 };
    const pos = d.balance >= 0;
    grid.insertAdjacentHTML('beforeend', `
      <div class="src-card ${clsMap[s]}">
        <div class="src-title">${esc(srcLabel[s]||s)}</div>
        <div class="src-row">
          <span class="src-label">הכנסות</span>
          <span class="src-val pos">₪${fmt(d.totalIncome)}</span>
        </div>
        <div class="src-row">
          <span class="src-label">הוצאות</span>
          <span class="src-val neg">₪${fmt(d.totalExpense)}</span>
        </div>
        <div class="src-row">
          <span class="src-label">ייעוד</span>
          <span class="src-val">₪${fmt(d.allocated||0)}</span>
        </div>
        <div class="src-balance ${pos?'pos':'neg'}">
          יתרה: ₪${fmt(d.balance)}
        </div>
      </div>`);
  });

  const t = STATE.summary.total || {};
  const tpos = (t.balance||0) >= 0;
  document.getElementById('totalCard').innerHTML = `
    <div class="total-item"><div class="total-label">סה"כ הכנסות</div><div class="total-val pos">₪${fmt(t.totalIncome)}</div></div>
    <div class="total-item"><div class="total-label">סה"כ הוצאות</div><div class="total-val neg">₪${fmt(t.totalExpense)}</div></div>
    <div class="total-item"><div class="total-label">יתרה כוללת</div><div class="total-val ${tpos?'pos':'neg'}">₪${fmt(t.balance)}</div></div>`;
}

// ─── ENTRIES ───────────────────────────────────────
function renderEntries() {
  const fSrc     = document.getElementById('fSource').value;
  const fType    = document.getElementById('fType').value;
  const fCat     = (document.getElementById('fCat').value || '').toLowerCase().trim();
  const fDateFrom= document.getElementById('fDateFrom').value;
  const fDateTo  = document.getElementById('fDateTo').value;

  let rows = STATE.entries.filter(e => {
    if (fSrc  && e.source !== fSrc)  return false;
    if (fType && e.type   !== fType) return false;
    if (fCat  && !(e.category||'').toLowerCase().includes(fCat)) return false;
    if (fDateFrom && e.date < fDateFrom) return false;
    if (fDateTo   && e.date > fDateTo)   return false;
    return true;
  });

  const tbody = document.getElementById('entriesTbody');
  let html = '';

  // Add form row at top
  if (STATE.addingEntry) {
    html += `<tr class="add-form-row" id="addEntryRow">
      <td><input type="date" id="aDate" style="width:130px;"></td>
      <td><select id="aSrc">
        <option value="parents">הורים</option>
        <option value="gapan">גפ"ן</option>
        <option value="authority">רשות</option>
      </select></td>
      <td><select id="aType">
        <option value="income">הכנסה</option>
        <option value="expense">הוצאה</option>
      </select></td>
      <td><input id="aCat" type="text" placeholder="ייעוד"></td>
      <td><input id="aDesc" type="text" placeholder="תיאור"></td>
      <td><input id="aAmount" type="number" min="0" step="0.01" placeholder="0" style="width:90px;"></td>
      <td style="display:flex;gap:5px;padding:8px 6px;">
        <button class="btn-confirm" onclick="confirmAddEntry()">✓ הוסף</button>
        <button class="btn-cancel" onclick="cancelAddEntry()">ביטול</button>
      </td>
    </tr>`;
  }

  const typeLabel = { income:'הכנסה', expense:'הוצאה' };
  rows.forEach(e => {
    const isIncome = e.type === 'income';
    html += `<tr data-id="${e.id}">
      <td>${esc(e.date||'')}</td>
      <td><span class="src-badge">${esc(srcLabel[e.source]||e.source)}</span></td>
      <td><span class="type-badge type-${e.type}">${typeLabel[e.type]||e.type}</span></td>
      <td>${esc(e.category||'')}</td>
      <td>${esc(e.description||'')}</td>
      <td class="${isIncome?'amount-pos':'amount-neg'}">
        ${isIncome?'+':'-'}₪${fmt(e.amount)}
      </td>
      <td>
        <button class="btn-icon" onclick="deleteEntry(${e.id})" title="מחק">🗑</button>
      </td>
    </tr>`;
  });

  tbody.innerHTML = html;
}

function showAddEntryForm() {
  STATE.addingEntry = true;
  renderEntries();
  const d = document.getElementById('aDate');
  if (d) d.value = new Date().toISOString().slice(0,10);
}
function cancelAddEntry() { STATE.addingEntry = false; renderEntries(); }

async function confirmAddEntry() {
  const entry = {
    school:     STATE.school,
    year:       STATE.year,
    source:     document.getElementById('aSrc').value,
    type:       document.getElementById('aType').value,
    category:   document.getElementById('aCat').value.trim(),
    description:document.getElementById('aDesc').value.trim(),
    amount:     parseFloat(document.getElementById('aAmount').value) || 0,
    date:       document.getElementById('aDate').value,
  };
  try {
    const res = await PortalAuth.authFetch(`${WORKER}/api/budget/entry`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify(entry),
    });
    const d = await res.json();
    entry.id = d.id;
    STATE.entries.unshift(entry);
    recomputeSummary();
    STATE.addingEntry = false;
    renderAll();
  } catch { alert('שגיאה בשמירה'); }
}

async function deleteEntry(id) {
  if (!confirm('מחוק תנועה זו?')) return;
  try {
    await PortalAuth.authFetch(`${WORKER}/api/budget/entry/${id}`, { method:'DELETE' });
    STATE.entries = STATE.entries.filter(e => e.id !== id);
    recomputeSummary();
    renderAll();
  } catch { alert('שגיאה במחיקה'); }
}

// ─── ALLOCATIONS ───────────────────────────────────
function renderAllocations() {
  const sources = ['parents','gapan','authority'];
  const container = document.getElementById('allocContainer');
  container.innerHTML = '';

  sources.forEach(s => {
    const allocs = STATE.allocations.filter(a => a.source === s);
    const srcData = STATE.summary.bySource?.[s] || {};
    const totalIncome = srcData.totalIncome || 0;

    let rowsHTML = '';
    allocs.forEach(a => {
      const spent = STATE.entries
        .filter(e => e.source === s && e.type === 'expense' && e.category === a.category)
        .reduce((sum, e) => sum + (e.amount||0), 0);
      const remaining = (a.allocated||0) - spent;
      const pct = a.allocated > 0 ? Math.min(100, (spent / a.allocated) * 100) : 0;
      rowsHTML += `
        <div class="alloc-row">
          <div class="alloc-name">${esc(a.category)}</div>
          <div class="alloc-nums">
            <div class="alloc-num"><div class="an-label">מיועד</div><div class="an-val">₪${fmt(a.allocated)}</div></div>
            <div class="alloc-num"><div class="an-label">בוצע</div><div class="an-val" style="color:var(--red)">₪${fmt(spent)}</div></div>
            <div class="alloc-num"><div class="an-label">נשאר</div><div class="an-val" style="color:${remaining>=0?'var(--green)':'var(--red)'}">₪${fmt(remaining)}</div></div>
          </div>
          <div class="alloc-bar-wrap">
            <div class="alloc-bar-fill${pct>=100?' over':''}" style="width:${pct}%"></div>
          </div>
          <button class="btn-del-alloc" onclick="deleteAllocation(${a.id})" title="מחק">🗑</button>
        </div>`;
    });

    container.insertAdjacentHTML('beforeend', `
      <div class="alloc-section">
        <div class="alloc-header">
          <span class="ah-title">${esc(srcLabel[s]||s)}</span>
          <span style="font-size:0.75rem;opacity:.7;">הכנסות: ₪${fmt(totalIncome)}</span>
        </div>
        <div class="alloc-body">
          ${rowsHTML || '<div style="color:var(--muted);font-size:0.82rem;padding:8px 0;">אין ייעודי תקציב</div>'}
          <button class="btn-add-alloc" onclick="addAllocation('${s}')">＋ הוסף ייעוד</button>
        </div>
      </div>`);
  });
}

async function addAllocation(source) {
  const category  = prompt(`שם הייעוד (${srcLabel[source]||source}):`);
  if (!category) return;
  const allocated = parseFloat(prompt('סכום מיועד (₪):', '0')) || 0;
  try {
    const res = await PortalAuth.authFetch(`${WORKER}/api/budget/allocation`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ school:STATE.school, year:STATE.year, source, category, allocated }),
    });
    const d = await res.json();
    STATE.allocations.push({ id: d.id, school:STATE.school, year:STATE.year, source, category, allocated });
    recomputeSummary();
    renderAll();
  } catch { alert('שגיאה בשמירה'); }
}

async function deleteAllocation(id) {
  if (!confirm('מחוק ייעוד זה?')) return;
  try {
    await PortalAuth.authFetch(`${WORKER}/api/budget/allocation/${id}`, { method:'DELETE' });
    STATE.allocations = STATE.allocations.filter(a => a.id !== id);
    recomputeSummary();
    renderAll();
  } catch { alert('שגיאה במחיקה'); }
}

// ─── RECOMPUTE SUMMARY ─────────────────────────────
function recomputeSummary() {
  const sources = ['parents','gapan','authority'];
  const bySource = {};
  sources.forEach(s => {
    const srcE = STATE.entries.filter(e => e.source === s);
    const totalIncome  = srcE.filter(e => e.type==='income') .reduce((a,e)=>a+(e.amount||0),0);
    const totalExpense = srcE.filter(e => e.type==='expense').reduce((a,e)=>a+(e.amount||0),0);
    const allocated    = STATE.allocations.filter(a=>a.source===s).reduce((a,r)=>a+(r.allocated||0),0);
    bySource[s] = { totalIncome, totalExpense, balance: totalIncome-totalExpense, allocated, remaining: totalIncome-totalExpense };
  });
  const total = {
    totalIncome:  Object.values(bySource).reduce((a,s)=>a+s.totalIncome,0),
    totalExpense: Object.values(bySource).reduce((a,s)=>a+s.totalExpense,0),
    balance:      Object.values(bySource).reduce((a,s)=>a+s.balance,0),
  };
  STATE.summary = { bySource, total };
}

// ─── SAVE ──────────────────────────────────────────
function saveToPortal() {
  window.parent.postMessage({
    type:'save-request', docType:'budget',
    payload:{ school:STATE.school, year:STATE.year,
              entries: STATE.entries, allocations: STATE.allocations },
  }, PORTAL_ORIGIN);
}
</script>
