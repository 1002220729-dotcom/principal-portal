    return populationsData[className + '-' + categoryId] || [];
}

function getTotalForCategory(categoryId) {
    let total = 0;
    // Iterate over all keys in populationsData
    Object.keys(populationsData).forEach(key => {
        // Check if the key ends with this category
        if (key.endsWith('-' + categoryId)) {
            const students = populationsData[key];
            if (Array.isArray(students)) {
                total += students.length;
            }
        }
    });
    return total;
}

function getTotalForClass(className) {
    let total = 0;
    // Iterate over all keys in populationsData
    Object.keys(populationsData).forEach(key => {
        // Check if the key starts with this className (e.g., "א1-", "א2-")
        if (key.startsWith(className)) {
            const students = populationsData[key];
            if (Array.isArray(students)) {
                total += students.length;
            }
        }
    });
    return total;
}

function getGrandTotal() {
    let total = 0;
    // Simply iterate over all students in populationsData
    Object.values(populationsData).forEach(students => {
        if (Array.isArray(students)) {
            total += students.length;
        }
    });
    return total;
}

            // --- לוגיקה (זהה למקור) ---
            const addOrUpdateItem = () => {
                const selectedDomains = Object.entries(formData.domains)
                    .filter(([_, isSelected]) => isSelected)
                    .map(([domain]) => domain);

                if (!formData.name.trim()) return alert('יש למלא שם לפריט');
                if (selectedDomains.length === 0) return alert('יש לבחור לפחות תחום אחד');

                    domains: selectedDomains,
                    createdAt: editingItem?.createdAt || new Date().toISOString()

                    setItems(prev => ({ ...prev, [activeArena]: prev[activeArena].map(item => item.id === editingItem.id ? newItem : item) }));

                    setItems(prev => ({ ...prev, [activeArena]: [...prev[activeArena], newItem] }));
                }
                resetForm();
            };

            const resetForm = () => {
                setFormData({ name: '', description: '', tier: 'tier1', domains: { emotional: false, social: false, pedagogical: false } });
                setEditingItem(null);
            };

            const handleEdit = (item) => {
                setEditingItem(item);
                setFormData({
                    name: item.name, description: item.description, tier: item.tier,
                    domains: { emotional: item.domains.includes('emotional'), social: item.domains.includes('social'), pedagogical: item.domains.includes('pedagogical') }
                });
            };

            const handleDelete = (id) => {

                }
            };

            // לוגיקת אוכלוסיות
            const addStudentToCategory = () => {
                if (!studentInput.trim()) return alert('יש להזין שם תלמיד');
                const classKey = selectedClassNumber === 'כל השכבה' ? selectedClass : `${selectedClass}${selectedClassNumber}`;
                const key = `${classKey}-${selectedCategory}`;
                const studentName = studentInput.trim();

                // Check for duplicate student in same cell
                const existing = populationsData[key] || [];
                if (existing.includes(studentName)) return alert(`התלמיד "${studentName}" כבר קיים ברשימה זו`);

                // Add student to populations
                setPopulationsData(prev => ({ ...prev, [key]: [...(prev[key] || []), studentName] }));

                // Save note if provided
                if (studentNote.trim()) {
                    const noteKey = `${key}-${studentName}`;
                    setStudentNotes(prev => ({ ...prev, [noteKey]: studentNote.trim() }));
                }

                setStudentInput('');
                setStudentNote('');
            };

            const removeStudent = (className, categoryId, studentIndex) => {
                const key = `${className}-${categoryId}`;
                const students = populationsData[key] || [];
                const studentName = students[studentIndex];

                // Remove student
                setPopulationsData(prev => ({ ...prev, [key]: prev[key].filter((_, idx) => idx !== studentIndex) }));

                // Remove note if exists
                const noteKey = `${key}-${studentName}`;
                setStudentNotes(prev => {
                    const updated = { ...prev };
                    delete updated[noteKey];
                    return updated;
                });
            };

            const openEditNote = (studentName, classKey, categoryId) => {
                const noteKey = `${classKey}-${categoryId}-${studentName}`;
                const currentNote = studentNotes[noteKey] || '';
                setEditingNote({ studentName, noteKey, currentNote });
                setShowEditNoteDialog(true);
            };

            const saveEditedNote = () => {
                if (editingNote.currentNote.trim()) {
                    setStudentNotes(prev => ({ ...prev, [editingNote.noteKey]: editingNote.currentNote.trim() }));
                } else {
                    // If note is empty, delete it
                    setStudentNotes(prev => {
                        const updated = { ...prev };
                        delete updated[editingNote.noteKey];
                        return updated;
                    });
                }
                setShowEditNoteDialog(false);
                setEditingNote({ studentName: '', noteKey: '', currentNote: '' });
            };

            const getStudentsForCell = (className, categoryId) => {
                return populationsData[`${className}-${categoryId}`] || [];
            };

            const toggleGrade = (grade) => {
                setExpandedGrades(prev => ({ ...prev, [grade]: !prev[grade] }));
            };

            const addClassToGrade = () => {
                if (!newClassName.trim()) return alert('יש להזין שם/מספר כיתה');
                setClassStructure(prev => ({

                if (confirm(`האם למחוק את כיתה ${grade}${className}?`)) {
                    setClassStructure(prev => ({
                        ...prev,
                        [grade]: prev[grade].filter(c => c !== className)
                    }));
                    // Also remove all students from this class
                    const classKey = `${grade}${className}`;
                    const newPopData = { ...populationsData };
                    Object.keys(newPopData).forEach(key => {
                        if (key.startsWith(classKey + '-')) {

                    setPopulationsData(newPopData);

            const getTotalForClass = (className) => {
                let total = 0;
                populationCategories.forEach(cat => {
                    total += getStudentsForCell(className, cat.id).length;

                // If this is a main grade and it's collapsed, include subclasses
                if (classes.includes(className) && !expandedGrades[className] && classStructure[className]) {
                    classStructure[className].forEach(subClass => {
                        populationCategories.forEach(cat => {
                            total += getStudentsForCell(`${className}${subClass}`, cat.id).length;
                        });
                    });
                }
                return total;
            };

            const getTotalForCategory = (categoryId) => {
                let total = 0;
                // Count main grades
                classes.forEach(className => {
                    total += getStudentsForCell(className, categoryId).length;
                });
                // Count subclasses
                classes.forEach(grade => {
                    if (classStructure[grade]) {
                        classStructure[grade].forEach(subClass => {
                            total += getStudentsForCell(`${grade}${subClass}`, categoryId).length;
                        });
                    }
                });
                return total;
            };

            const getGrandTotal = () => {
                let total = 0;
                // Count main grades
                classes.forEach(c => populationCategories.forEach(cat => total += getStudentsForCell(c, cat.id).length));
                // Count subclasses
                classes.forEach(grade => {
                    if (classStructure[grade]) {
                        classStructure[grade].forEach(subClass => {
                            populationCategories.forEach(cat => {

                return {

                    },

                };

            // ייצוא נתונים
            const exportAsJSON = () => {
                const dataToExport = {
                    version: '2.0',

                    schoolName,
                    items,
                    populationsData,
                    studentNotes,
                    classStructure
                };
                const blob = new Blob([JSON.stringify(dataToExport, null, 2)], { type: 'application/json' });
                const a = document.createElement('a');
                const blobUrl = URL.createObjectURL(blob);
                a.href = blobUrl;
                a.download = `mtss-backup-${new Date().toISOString().slice(0, 10)}.json`;
                a.click();
                setTimeout(() => URL.revokeObjectURL(blobUrl), 100);
            };

            const importFromJSON = (event) => {
                const file = event.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const imported = JSON.parse(e.target.result);

                        // Validate structure and ensure all arenas exist
                        if (imported.items) {
                            setItems({
                                learning: imported.items.learning || [],
                                support: imported.items.support || [],
                                staffSupport: imported.items.staffSupport || []
                            });
                        }
                        if (imported.populationsData) {
                            setPopulationsData(imported.populationsData);
                        }
                        if (imported.studentNotes) {
                            setStudentNotes(imported.studentNotes);
                        }
                        if (imported.classStructure) {
                            setClassStructure(imported.classStructure);
                        }
                        if (imported.schoolName) {
                            setSchoolName(imported.schoolName);
                        }

                        alert('✅ הנתונים יובאו בהצלחה!');
                        setShowImportDialog(false);
                    } catch (error) {
                        alert('❌ שגיאה בקריאת הקובץ. אנא ודא שזה קובץ JSON תקין.');
                        console.error('Import error:', error);
                    }
                };
                reader.readAsText(file);
            };

            const handleMultipleFiles = (event) => {
                const files = Array.from(event.target.files);
                if (files.length === 0) return;

                const promises = files.map(file => {
                    return new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.onload = (e) => {
                            try {
                                const data = JSON.parse(e.target.result);
                                resolve({ fileName: file.name, data });
                            } catch (error) {
                                reject({ fileName: file.name, error });
                            }
                        };
                        reader.onerror = () => reject({ fileName: file.name, error: 'Failed to read file' });
                        reader.readAsText(file);
                    });
                });

                Promise.all(promises)
                    .then(loadedFiles => {
                        setFilesToMerge(loadedFiles);
                        generateMergePreview(loadedFiles);
                        setShowMergeDialog(true);
                    })
                    .catch(error => {
                        alert('❌ שגיאה בקריאת אחד או יותר מהקבצים');
                        console.error('Files loading error:', error);
                    });
            };

            const generateMergePreview = (files) => {
                const preview = {
                    learning: [],
                    support: [],
                    staffSupport: [],
                    populationsData: {},
                    studentNotes: {},
                    classStructure: {},
                    schoolNames: []
                };

                files.forEach(({ fileName, data }) => {
                    // Merge items
                    if (data.items) {
                        if (data.items.learning) preview.learning.push(...data.items.learning);
                        if (data.items.support) preview.support.push(...data.items.support);
                        if (data.items.staffSupport) preview.staffSupport.push(...data.items.staffSupport);
                    }

                    // Merge populations
                    if (data.populationsData) {
                        Object.assign(preview.populationsData, data.populationsData);
                    }

                    // Merge notes
                    if (data.studentNotes) {
                        Object.assign(preview.studentNotes, data.studentNotes);
                    }

                    // Merge class structure
                    if (data.classStructure) {
                        Object.keys(data.classStructure).forEach(grade => {
                            if (!preview.classStructure[grade]) {
                                preview.classStructure[grade] = [];
                            }
                            const newClasses = data.classStructure[grade] || [];
                            newClasses.forEach(cls => {
                                if (!preview.classStructure[grade].includes(cls)) {
                                    preview.classStructure[grade].push(cls);
                                }
                            });
                        });
                    }

                    // Collect school names
                    if (data.schoolName) {
                        preview.schoolNames.push({ fileName, schoolName: data.schoolName });
                    }
                });

                setMergePreview(preview);
            };

            const executeMerge = () => {
                if (!mergePreview) return;

                // Merge items
                setItems({
                    learning: [...items.learning, ...mergePreview.learning],
                    support: [...items.support, ...mergePreview.support],
                    staffSupport: [...items.staffSupport, ...mergePreview.staffSupport]
                });

                // Merge populations
                setPopulationsData(prev => ({ ...prev, ...mergePreview.populationsData }));

                // Merge notes
                setStudentNotes(prev => ({ ...prev, ...mergePreview.studentNotes }));

                // Merge class structure
                setClassStructure(prev => {
                    const merged = { ...prev };
                    Object.keys(mergePreview.classStructure).forEach(grade => {
                        if (!merged[grade]) merged[grade] = [];
                        mergePreview.classStructure[grade].forEach(cls => {
                            if (!merged[grade].includes(cls)) {
                                merged[grade].push(cls);
                            }
                        });
                    });
                    return merged;
                });

                // Handle school name - keep current or show dialog if multiple
                if (mergePreview.schoolNames.length > 0 && !schoolName) {

<script>
        document.addEventListener('input', (e) => {
            if (window.parent !== window) {
                const target = e.target;
                // חיפוש חכם של שדה המוסד גם אם הוא נוצר דינמית
                if (target.id === 'school' || target.id === 'schoolName' || 
                    target.name === 'school' || target.name === 'schoolName' || 
                    (target.placeholder && (target.placeholder.includes('מוסד') || target.placeholder.includes('בית ספר')))) {
                    
                    window.parent.postMessage({ 
                        type: 'school-changed', 
                        school: target.value 
                    }, '*');
                }
            }
        });
    </script>

    <script>
    // ═══════════════════════════════════════════════════════════════════
    // תקשורת עם פורטל (index.html)
    // ═══════════════════════════════════════════════════════════════════

    // ── שלח iframe-ready לפורטל כשה-DOM מוכן ────────────────────────
    document.addEventListener('DOMContentLoaded', () => {
        if (window.parent !== window) {
            window.parent.postMessage({ type: 'iframe-ready', docType: 'mtss' }, '*');
        }
    });

    window.addEventListener('message', (e) => {
        if (!e.data || window.parent === window) return;

        // ── הפורטל מבקש נתונים לשמירה (request-data) ─────────────────
        if (e.data.type === 'request-data') {
            try {
                const saved = localStorage.getItem('mtss-mapper-data');
                if (saved) {
                    const data = JSON.parse(saved);
                    window.parent.postMessage({
                        type: 'save-request',
                        docType: 'mtss',
                        payload: { ...data, docType: 'mtss' }
                    }, '*');
                }
            } catch (err) {
                console.error('MTSS: failed to send data to portal', err);
            }
        }

        // ── הפורטל מאשר שמירה (save-confirm) ──────────────────────────
        if (e.data.type === 'save-confirm') {
            // הצג toast — מנסה להשתמש ב-React state אם זמין, אחרת alert זמני
            const msg = e.data.message || '✅ נשמר בהצלחה';
            window.dispatchEvent(new CustomEvent('mtss-save-confirm', { detail: { message: msg } }));
        }

        // ── הפורטל מבקש טעינת נתונים (load-data) ──────────────────────
        if (e.data.type === 'load-data') {
            const data = e.data.payload;
            if (!data) return;
            // *** תיקון: סמן שהנתונים הגיעו מה-portal — מנע auto-save שידרוס אותם ***
            window.__mtss_loading_from_portal = true;
            localStorage.setItem('mtss-mapper-data', JSON.stringify(data));
            window.dispatchEvent(new CustomEvent('mtss-load-data', { detail: data }));
            setTimeout(() => { window.__mtss_loading_from_portal = false; }, 2000);
        }

        // ── איפוס מהפורטל (reset) ──────────────────────────────────────
        if (e.data.type === 'reset') {
            localStorage.removeItem('mtss-mapper-data');
            window.dispatchEvent(new CustomEvent('mtss-reset'));
        }

        // ── מעבר ללשונית ספציפית מהפורטל (switch-tab) ─────────────────
        if (e.data.type === 'switch-tab' && e.data.tab) {
            window.dispatchEvent(new CustomEvent('mtss-switch-tab', { detail: { tab: e.data.tab } }));
        }
    });
    </script>
